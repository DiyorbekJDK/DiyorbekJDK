name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновление раз в сутки
  workflow_dispatch: # Позволяет запустить вручную
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DiyorbekJDK
          template: classic
          base: "" 
          config_timezone: UTC
          
          # --- ЯЗЫКИ (Настройка на максимум) ---
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex # Игнорим разметку, чтобы Java/Py вышли вперед
          plugin_languages_details: percentage, lines # Покажет и проценты, и строки кода
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes        # <--- ГЛУБОКИЙ АНАЛИЗ (сканирует файлы, а не только метаданные)
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 30 # Даем скрипту больше времени на раздумья
          plugin_languages_categories: programming # Считать только языки программирования
          
          # --- ДОПОЛНИТЕЛЬНО ---
          plugin_habits: yes
          plugin_habits_facts: yes
          config_theme: radical

