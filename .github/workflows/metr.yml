name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновление раз в сутки
  workflow_dispatch: # Позволяет запустить вручную
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DiyorbekJDK
          template: classic
          base: "" # Скрываем стандартную шапку
          config_timezone: UTC
          
          # Настройки темы как на фото
          config_order: habits, languages
          output_action: commit
          committer_gist: ${{ secrets.METRICS_TOKEN }}

          # Блок языков (как на нижней части фото)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          
          # Блок "Стриков" (как на верхней части фото)
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_days: 14
          
          # Цветовая схема (близкая к фото)
          config_theme: radical 
