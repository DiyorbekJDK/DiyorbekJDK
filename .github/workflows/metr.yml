name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновление раз в сутки
  workflow_dispatch: # Позволяет запустить вручную
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: DiyorbekJDK
          template: classic
          base: "" 
          config_timezone: UTC
          
          # Оставляем только языки пока не починим токен
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          
          # Попробуй убрать habits на один запуск, чтобы проверить языки
          plugin_habits: no 

